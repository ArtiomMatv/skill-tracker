# Production-style API process (gunicorn). Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
services:
  api:
    entrypoint: []
    command:
      - sh
      - -c
      - >-
        python manage.py migrate &&
        exec gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 2
